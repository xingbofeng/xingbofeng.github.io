name: Sync Profile README

on:
  push:
    branches:
      - master
    paths:
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-profile-readme
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Validate sync token
        run: test -n "${PROFILE_SYNC_TOKEN}"
        env:
          PROFILE_SYNC_TOKEN: ${{ secrets.PROFILE_SYNC_TOKEN }}

      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          repository: xingbofeng/xingbofeng
          token: ${{ secrets.PROFILE_SYNC_TOKEN }}
          path: profile

      - name: Copy README
        run: cp source/README.md profile/README.md

      - name: Commit and push profile README
        working-directory: profile
        run: |
          if git diff --quiet -- README.md; then
            echo "Profile README is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync profile README"
          git push
